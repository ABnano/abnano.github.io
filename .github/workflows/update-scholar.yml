name: Update Publications from Google Scholar

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:       # Manual trigger from GitHub Actions tab

jobs:
  update-publications:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scholarly
        run: pip install scholarly

      - name: Fetch publications
        run: python update_scholar.py

      - name: Commit updated publications.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: auto-update publications from Google Scholar'
          file_pattern: publications.json
